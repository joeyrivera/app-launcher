// ============ localStorage WRAPPERS (replacing window.storage) ============
function storageGet(key) {
  try {
    const v = localStorage.getItem(key);
    if (v == null) return null;
    return { value: v };
  } catch (e) { return null; }
}
function storageSet(key, value) {
  try { localStorage.setItem(key, value); }
  catch (e) { console.error("Save failed:", e); }
}

// API key persistence for scan feature
const API_KEY_STORAGE = "library:apiKey";
function getStoredApiKey() {
  try { return localStorage.getItem(API_KEY_STORAGE) || ""; } catch (e) { return ""; }
}
function setStoredApiKey(k) {
  try { if (k) localStorage.setItem(API_KEY_STORAGE, k); else localStorage.removeItem(API_KEY_STORAGE); }
  catch (e) {}
}

function seedDemoIfNeeded() {

  }

}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function daysSince(iso) {
  if (!iso) return 0;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}

function todayISO() {
  return localISO(new Date());
}

// Convert a Date to YYYY-MM-DD using LOCAL timezone (not UTC).
// Critical: toISOString() returns UTC, which silently shifts the date for users
// outside UTC. A user in Eastern Time logging at 9pm sees their date jump forward.
function localISO(d) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

// Normalize tags: lowercase, trimmed — used everywhere tags are stored/compared
function normalizeTag(t) {
  return (t || '').toLowerCase().trim();
}

// Convert readDays (mixed: strings or {date,bookId}) → Set of YYYY-MM-DD strings
function readDaysToDateSet(readDays) {
  const set = new Set();
  (readDays || []).forEach(d => {
    if (typeof d === 'string') set.add(d);
    else if (d && d.date) set.add(d.date);
  });
  return set;
}

function daysUntil(iso) {
  if (!iso) return null;
  const due = new Date(iso + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return Math.floor((due - today) / 86400000);
}

function dueInfo(dueIso) {
  if (!dueIso) return null;
  const d = daysUntil(dueIso);
  if (d < 0) return { tier: 'overdue', days: -d, label: d === -1 ? 'overdue by 1 day' : `overdue by ${-d} days` };
  if (d === 0) return { tier: 'today', days: 0, label: 'due today!' };
  if (d === 1) return { tier: 'soon', days: 1, label: 'due tomorrow' };
  if (d <= 7) return { tier: 'soon', days: d, label: `due in ${d} days` };
  if (d <= 30) return { tier: 'future', days: d, label: `due in ${d} days` };
  return { tier: 'far', days: d, label: `due ${formatDate(dueIso)}` };
}

// Compute reading streak from a Set of ISO date strings (YYYY-MM-DD)
function computeStreak(readDaysSet) {
  if (!readDaysSet || readDaysSet.size === 0) return { current: 0, longest: 0 };
  let longest = 0;
  let current = 0;

  // Current streak: count back from today (or yesterday) while consecutive days are read
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  const todayStr = localISO(today);
  const yesterdayStr = localISO(yesterday);

  let startCounting = readDaysSet.has(todayStr);
  let walker = startCounting ? today : (readDaysSet.has(yesterdayStr) ? yesterday : null);
  if (walker) {
    while (true) {
      const iso = localISO(walker);
      if (readDaysSet.has(iso)) {
        current++;
        walker.setDate(walker.getDate() - 1);
      } else break;
    }
  }

  // Longest streak: sort all dates, find longest consecutive run
  const sorted = [...readDaysSet].sort();
  let run = 0;
  let prev = null;
  for (const d of sorted) {
    if (prev === null) { run = 1; }
    else {
      const a = new Date(prev + 'T00:00:00');
      const b = new Date(d + 'T00:00:00');
      const diff = Math.round((b - a) / 86400000);
      run = diff === 1 ? run + 1 : 1;
    }
    if (run > longest) longest = run;
    prev = d;
  }
  return { current, longest };
}

// Pick a quote based on the day so it's stable for the day but rotates daily
function quoteOfTheDay() {
  const epochDays = Math.floor(Date.now() / 86400000);
  return QUOTES[epochDays % QUOTES.length];
}

// Sort loans so earliest due dates are first; loans without a due date sink to the bottom
function sortByDueDate(arr) {
  return [...arr].sort((a, b) => {
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate && !b.dueDate) return -1;
    if (!a.dueDate && b.dueDate) return 1;
    // Both undated: most recently lent/borrowed at top
    return (b.dateOut || '').localeCompare(a.dateOut || '');
  });
}

// Convert an uploaded image file to base64 (strips the data URL prefix)
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      if (typeof result !== 'string') return reject(new Error('Bad file data'));
      const base64 = result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

// Convert a File into a small JPEG data URL suitable for displaying as a cover thumbnail.
// Keeps the longest side <= maxSize px (default 360). Returns null on failure.
async function fileToCoverThumb(file, maxSize = 360) {
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error('read failed'));
      reader.readAsDataURL(file);
    });
    const img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.onload = () => resolve(i);
      i.onerror = () => reject(new Error('image load failed'));
      i.src = dataUrl;
    });
    const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    return canvas.toDataURL('image/jpeg', 0.82);
  } catch (e) {
    console.warn('Cover thumbnail failed:', e);
    return null;
  }
}

// Search Open Library for a book and return a cover image URL (or null if not found).
// Returns { url } on success or { error } so the UI can show what went wrong.
async function searchBookCover(title, author) {
  if (!title) return { error: 'no title' };

  // Strategy 1: Search API (most accurate)
  try {
    const params = new URLSearchParams();
    params.set('title', title);
    if (author) params.set('author', author);
    params.set('limit', '5');
    params.set('fields', 'cover_i,title,author_name');
    const response = await fetch(`https://openlibrary.org/search.json?${params}`);
    if (!response.ok) {
      return { error: `search returned ${response.status}` };
    }
    const data = await response.json();
    if (data.docs && data.docs.length > 0) {
      for (const doc of data.docs) {
        if (doc.cover_i) {
          return { url: `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg` };
        }
      }
      // Search worked but no cover_i on any result
      // Strategy 2: cover-by-title fallback
      return { url: coverByTitleUrl(title) };
    }
    // No results at all
    return { url: coverByTitleUrl(title) };
  } catch (e) {
    // Most common failure mode: fetch blocked by sandbox / CSP / network
    const msg = e?.message || String(e);
    return { error: `fetch failed: ${msg}` };
  }
}

// Open Library's "cover-by-title" endpoint — returns a cover if matched, or a small
// placeholder if not. We store this URL directly without checking it (saves an extra
// request) and let the <img> tag handle a missing image gracefully.
function coverByTitleUrl(title) {
  return `https://covers.openlibrary.org/b/title/${encodeURIComponent(title)}-M.jpg`;
}

// Ask Claude to identify a book from a photo and return structured info
async function analyzeBookImage(base64, mediaType, apiKey) {
  if (!apiKey) throw new Error("NO_API_KEY");
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 500,
      system: 'You identify books from photos. You respond with ONLY a JSON object — no markdown, no code fences, no preamble, no explanation. Just the raw JSON object.',
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          {
            type: 'text',
            text: `Identify the book shown. Return ONLY this JSON shape:
{
  "title": "exact title from the cover",
  "author": "author's full name",
  "series": "series name if visible or confidently known, else null",
  "seriesNumber": book number in the series as an integer, else null,
  "format": "physical" if it looks like a physical book/cover/spine, OR "kindle" if it looks like an e-reader screen or screenshot
}
If you cannot identify a book from this image, return exactly: {"error":"couldn't identify"}`
          }
        ]
      }]
    })
  });
  if (!response.ok) throw new Error('API request failed (' + response.status + ')');
  const data = await response.json();
  const text = (data.content || []).find(b => b.type === 'text')?.text || '';
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}


// Get subjects/genres for a single book from Open Library.
async function getBookSubjects(title, author) {
  try {
    const params = new URLSearchParams();
    params.set('title', title);
    if (author) params.set('author', author);
    params.set('limit', '1');
    params.set('fields', 'subject');
    const response = await fetch(`https://openlibrary.org/search.json?${params}`);
    if (!response.ok) return [];
    const data = await response.json();
    if (!data.docs || data.docs.length === 0) return [];
    return data.docs[0].subject || [];
  } catch (e) {
    return [];
  }
}

// Filter out noisy subjects that aren't useful for matching genres/themes.
function isUsefulSubject(s) {
  if (!s || typeof s !== 'string') return false;
  const lower = s.toLowerCase().trim();
  if (lower.length > 50 || lower.length < 3) return false;
  // Year/decade tags
  if (/^\d{4}/.test(lower)) return false;
  if (/^(19|20)\d0s$/.test(lower)) return false;
  // Publishing/promotional noise
  if (lower.includes('bestseller')) return false;
  if (lower.includes('new york times')) return false;
  if (lower.includes('book club')) return false;
  if (lower.includes('translations into')) return false;
  if (lower.includes('translations from')) return false;
  if (lower.includes('large print')) return false;
  if (lower.includes('illustrated')) return false;
  if (lower.includes('audiobook')) return false;
  if (lower.includes('ebook')) return false;
  if (lower.includes('open_syllabus')) return false;
  // Too broad
  const tooBroad = ['fiction', 'non-fiction', 'nonfiction', 'literature', 'english', 'american', 'british'];
  if (tooBroad.includes(lower)) return false;
  return true;
}

// Find similar books based on the user's library by aggregating Open Library subjects.
// Returns { books, subjects } on success, or { error } on failure.
async function fetchSimilarByGenre(books) {
  if (!books || books.length === 0) return { error: 'EMPTY_LIBRARY' };

  // Pick seed books: rated highly first, then 'read', then recently added.
  const seedBooks = [...books].sort((a, b) => {
    const ra = a.rating ?? -1;
    const rb = b.rating ?? -1;
    if (ra !== rb) return rb - ra;
    if (a.status === 'read' && b.status !== 'read') return -1;
    if (b.status === 'read' && a.status !== 'read') return 1;
    return (b.dateAdded || '').localeCompare(a.dateAdded || '');
  }).slice(0, 5);

  // Collect subjects from each seed
  const subjectCounts = {};
  let fetchErrorCount = 0;
  for (const book of seedBooks) {
    try {
      const subjects = await getBookSubjects(book.title, book.author);
      subjects.forEach(s => {
        if (!isUsefulSubject(s)) return;
        const key = s.toLowerCase();
        if (!subjectCounts[key]) subjectCounts[key] = { count: 0, display: s };
        subjectCounts[key].count++;
      });
      await new Promise(r => setTimeout(r, 150));
    } catch (e) {
      fetchErrorCount++;
    }
  }

  if (Object.keys(subjectCounts).length === 0) {
    if (fetchErrorCount > 0) return { error: 'fetch failed: Open Library unreachable' };
    return { error: 'NO_SUBJECTS' };
  }

  // Take top 5 subjects, preferring those that appear in multiple seed books
  const topEntries = Object.entries(subjectCounts).sort((a, b) => b[1].count - a[1].count).slice(0, 5);
  const subjectsForDisplay = topEntries.map(([, v]) => v.display);
  const subjectsForQuery = topEntries.slice(0, 3).map(([, v]) => v.display);

  // Search for popular books matching those subjects
  try {
    const q = subjectsForQuery.join(' ');
    const params = new URLSearchParams();
    params.set('q', q);
    params.set('limit', '40');
    params.set('fields', 'title,author_name,first_publish_year,cover_i,ratings_average,ratings_count,key');
    params.set('sort', 'rating');
    const response = await fetch(`https://openlibrary.org/search.json?${params}`);
    if (!response.ok) return { error: `search returned ${response.status}` };
    const data = await response.json();
    if (!data.docs || data.docs.length === 0) return { error: 'NO_RESULTS', subjects: subjectsForDisplay };

    // Filter out owned books (compare by title + first author)
    const ownedKeys = new Set(books.map(b => {
      const t = (b.title || '').toLowerCase().trim();
      const a = (b.author || '').toLowerCase().trim().split(/[,;]/)[0].trim();
      return `${t}|${a}`;
    }));

    const candidates = data.docs
      .filter(d => d.title)
      .filter(d => {
        const t = d.title.toLowerCase().trim();
        const a = (d.author_name?.[0] || '').toLowerCase().trim();
        return !ownedKeys.has(`${t}|${a}`) && !ownedKeys.has(`${t}|`);
      })
      // Prefer ones with covers and reasonable rating counts (filter out obscure)
      .filter(d => (d.ratings_count || 0) >= 3 || d.cover_i)
      .slice(0, 12);

    const results = candidates.map(d => ({
      title: d.title,
      author: d.author_name?.[0] || '',
      coverUrl: d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-M.jpg` : null,
      year: d.first_publish_year,
      rating: d.ratings_average,
    }));

    return { books: results, subjects: subjectsForDisplay };
  } catch (e) {
    const msg = e?.message || String(e);
    return { error: `fetch failed: ${msg}`, subjects: subjectsForDisplay };
  }
}

function BookTracker() {

  // Auto-fetch covers state

  // Free similar-books-by-genre state (no API key needed)

  const [settingsModal, setSettingsModal] = useState(false);

  const [catMood, setCatMood] = useState('idle');

  const [dialog, setDialog] = useState(null);

  // Undo toast — stack of recent destructive actions
  const [undoStack, setUndoStack] = useState([]);

  // Bulk add modal
  const [bulkAddOpen, setBulkAddOpen] = useState(false);

  // Shelf sort
  const [shelfSort, setShelfSort] = useState('series'); // 'series' | 'newest' | 'oldest' | 'rating' | 'title' | 'random'

  function askConfirm(opts) { setDialog(opts); }
  function showInfo(title, body) { setDialog({ title, body, info: true }); }

  // Push an action onto the undo stack, auto-clear after 6 seconds
  function pushUndo(entry) {
    const id = uid();
    const toast = { id, ...entry };
    setUndoStack(s => [...s, toast]);
    setTimeout(() => {
      setUndoStack(s => s.filter(t => t.id !== id));
    }, 6000);
  }

  function dismissUndo(id) {
    setUndoStack(s => s.filter(t => t.id !== id));
  }

  function triggerCat(mood) {
    setCatMood(mood);
    setTimeout(() => setCatMood('idle'), 2500);
  }

  function exportLibrary() {
    const payload = { version: 2, exportedAt: new Date().toISOString(), books, lending, readDays, goal };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reading-nook-${todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  async function importLibrary(file) {
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data.books) || !Array.isArray(data.lending)) {
        showInfo("That doesn't look right", "The file doesn't look like a Reading Nook export.");
        return;
      }
      setSettingsModal(false);
      askConfirm({
        title: 'Replace your library?',
        body: `This will import ${data.books.length} ${data.books.length === 1 ? 'book' : 'books'} and ${data.lending.length} loan ${data.lending.length === 1 ? 'record' : 'records'}, replacing everything currently on your shelf. Make sure you've exported a backup first if you want to keep your current data.`,
        danger: true,
        confirmLabel: 'Replace library',
        onConfirm: async () => {
          await persistBooks(data.books);
          await persistLending(data.lending);
          if (Array.isArray(data.readDays)) await persistReadDays(data.readDays);
          if (data.goal && typeof data.goal === 'object') await persistGoal(data.goal);
          showInfo('Imported', `Successfully imported ${data.books.length} ${data.books.length === 1 ? 'book' : 'books'}.`);
        },
      });
    } catch (e) {
      showInfo("Couldn't read the file", "Is it a valid JSON export from The Reading Nook?");
    }
  }

  async function autoFetchCovers() {
    const booksNeedingCovers = books.filter(b => !b.coverImage && b.title);
    if (booksNeedingCovers.length === 0) {
      showInfo('All set', 'Every book in your library already has a cover.');
      return;
    }
    autoFetchCancelRef.current = false;
    setAutoFetch({ running: true, current: 0, total: booksNeedingCovers.length, found: 0, notFound: 0, firstError: null });

    let workingBooks = [...books];

    for (let i = 0; i < booksNeedingCovers.length; i++) {
      if (autoFetchCancelRef.current) break;
      const book = booksNeedingCovers[i];
      setAutoFetch(s => s ? { ...s, current: i + 1 } : s);

      const result = await searchBookCover(book.title, book.author);
      if (result?.url) {
        workingBooks = workingBooks.map(b => b.id === book.id ? { ...b, coverImage: result.url } : b);
        await persistBooks(workingBooks);
        setAutoFetch(s => s ? { ...s, found: s.found + 1 } : s);
      } else {
        setAutoFetch(s => s ? {
          ...s,
          notFound: s.notFound + 1,
          firstError: s.firstError || result?.error || null,
        } : s);
      }
      await new Promise(r => setTimeout(r, 250));
    }

    setAutoFetch(s => s ? { ...s, running: false } : s);
  }

  function cancelAutoFetch() {
    autoFetchCancelRef.current = true;
  }

  function closeAutoFetch() {
    setAutoFetch(null);
  }

  async function browseSimilar() {
    if (books.length === 0) {
      showInfo("Empty shelf", "Add a few books to your shelf first — 'Browse similar' looks at your existing books to find new ones.");
      return;
    }
    setSimilarModal({ loading: true, books: [], subjects: [], error: null });
    const result = await fetchSimilarByGenre(books);
    if (result.error) {
      let msg = result.error;
      if (msg === 'NO_SUBJECTS') msg = "Couldn't find subject info for your books on Open Library. Try adding some popular titles.";
      else if (msg === 'NO_RESULTS') msg = "Open Library didn't return any matching books for these subjects.";
      else if (msg.startsWith('fetch failed')) msg = "Couldn't reach Open Library. Check your internet connection.";
      setSimilarModal({ loading: false, books: [], subjects: result.subjects || [], error: msg });
    } else {
      setSimilarModal({ loading: false, books: result.books, subjects: result.subjects, error: null });
    }
  }

  async function addSimilarBook(rec) {
    persistBooks([...books, {
      id: uid(),
      title: rec.title || '',
      author: rec.author || '',
      series: '',
      arc: '',
      seriesNumber: null,
      format: 'physical',
      status: 'want-to-read',
      rating: null,
      tags: [],
      notes: rec.year ? `From Browse Similar (first published ${rec.year})` : 'From Browse Similar',

      coverImage: rec.coverUrl || null,
      dateAdded: new Date().toISOString(),
    }]);

    // Remove from the similar list
    setSimilarModal(m => m ? {
      ...m,
      books: m.books.filter(r => r.title !== rec.title || r.author !== rec.author),
    } : m);
  }

  async function handleScanFile(file) {
    if (!file) return;

    const allowed = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
    if (!allowed.includes(file.type)) {
      setScanError(`That file type (${file.type || 'unknown'}) isn't supported. Try a JPEG or PNG.`);
      setShowScanModal(false);
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      setScanError('That photo is over 5MB. Try a smaller or lower-resolution shot.');
      setShowScanModal(false);
      return;
    }

    setShowScanModal(false);
    setScanning(true);
    setScanError(null);
    try {
      const apiKey = getStoredApiKey();
      if (!apiKey) {
        setScanning(false);
        setScanError("Set up an Anthropic API key in Settings before scanning. The scan feature uses Claude vision to read book covers.");
        return;
      }
      const [base64, coverImage] = await Promise.all([
        fileToBase64(file),
        fileToCoverThumb(file),
      ]);
      const result = await analyzeBookImage(base64, file.type, apiKey);
      setScanning(false);
      if (result.error || !result.title) {
        setScanError(result.error || "Couldn't read the cover clearly. Try a straighter, brighter shot.");

      }
      // Open the Add Book modal with prefilled fields + thumbnail

        title: result.title || '',
        author: result.author || '',
        series: result.series || '',
        seriesNumber: result.seriesNumber ?? '',
        format: result.format === 'kindle' ? 'kindle' : 'physical',
        status: 'want-to-read',
        notes: '',

      });
    } catch (err) {
      console.error('Scan error', err);
      setScanning(false);
      if (err.message === 'NO_API_KEY') setScanError("Add an Anthropic API key in Settings to enable scanning.");
      else setScanError("Something went wrong analyzing the photo. Try again, or add the book manually.");
    }
  }

  useEffect(() => {
    async function load() {
      try {
        const b = storageGet(STORAGE_BOOKS);
        if (b?.value) setBooks(JSON.parse(b.value));
      } catch (e) { /* first run */ }
      try {
        const l = storageGet(STORAGE_LENDING);
        if (l?.value) setLending(JSON.parse(l.value));
      } catch (e) { /* first run */ }
      try {
        const r = storageGet(STORAGE_READ_DAYS);
        if (r?.value) setReadDays(JSON.parse(r.value));
      } catch (e) { /* first run */ }
      try {
        const g = storageGet(STORAGE_GOAL);
        if (g?.value) setGoal(JSON.parse(g.value));
      } catch (e) { /* first run */ }
      setLoaded(true);
    }
    load();
  }, []);

  async function persistBooks(next) {
    setBooks(next);
    try { storageSet(STORAGE_BOOKS, JSON.stringify(next)); }
    catch (e) { console.error('Save failed', e); }
  }

  async function persistLending(next) {
    setLending(next);
    try { storageSet(STORAGE_LENDING, JSON.stringify(next)); }
    catch (e) { console.error('Save failed', e); }
  }

  async function persistReadDays(next) {
    setReadDays(next);
    try { storageSet(STORAGE_READ_DAYS, JSON.stringify(next)); }
    catch (e) { console.error('Save failed', e); }
  }

  async function persistGoal(next) {
    setGoal(next);
    try { storageSet(STORAGE_GOAL, JSON.stringify(next)); }
    catch (e) { console.error('Save failed', e); }
  }

  // Read sessions: [{ date: 'YYYY-MM-DD', bookId: '...' }, ...]
  // Backward-compat: older readDays entries may be just strings.
  function logReadingSession(bookId) {
    const today = todayISO();
    // Normalize current readDays into objects
    const normalized = (readDays || []).map(d => typeof d === 'string' ? { date: d, bookId: null } : d);
    const existsToday = normalized.some(d => d.date === today);
    let next;
    if (existsToday) {
      // Update today's entry with the book id (or remove if same book clicked twice)
      const todayEntry = normalized.find(d => d.date === today);
      if (todayEntry.bookId === bookId) {
        // Toggle off — remove today's log
        next = normalized.filter(d => d.date !== today);
      } else {
        next = normalized.map(d => d.date === today ? { ...d, bookId } : d);
      }
    } else {
      next = [...normalized, { date: today, bookId }];
    }
    persistReadDays(next);
  }

  function saveBook(book) {
    if (book.id) {
      const existing = books.find(b => b.id === book.id);
      // If status changed to 'read' from something else, trigger yawn
      if (existing && existing.status !== 'read' && book.status === 'read') {
        triggerCat('yawn');
      }
      persistBooks(books.map(b => b.id === book.id ? book : b));
    } else {
      persistBooks([...books, { ...book, id: uid(), dateAdded: new Date().toISOString(), rereads: 0 }]);
      triggerCat('sniff');
    }
    setBookModal(null);
  }

  function updateBookRating(id, rating) {
    persistBooks(books.map(b => b.id === id ? { ...b, rating } : b));
  }

  function addReread(id) {
    persistBooks(books.map(b => {
      if (b.id !== id) return b;
      return { ...b, rereads: (b.rereads || 0) + 1 };
    }));
    triggerCat('yawn');
  }

  function markBookRead(id) {
    const book = books.find(b => b.id === id);
    if (!book) return;
    if (book.status === 'read') return; // already read
    persistBooks(books.map(b => b.id === id ? { ...b, status: 'read', dateRead: new Date().toISOString() } : b));
    triggerCat('yawn');
  }

  function bulkAddBooks(rawText, defaults) {
    const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length === 0) return 0;
    const now = new Date().toISOString();
    const newBooks = lines.map((line, i) => {
      // Allow "Title — Author" or "Title - Author" or "Title by Author"
      let title = line;
      let author = defaults.author || '';
      const dashMatch = line.match(/^(.*?)\s+[—–-]\s+(.+)$/);
      const byMatch = !dashMatch && line.match(/^(.*?)\s+by\s+(.+)$/i);
      if (dashMatch) { title = dashMatch[1].trim(); author = dashMatch[2].trim(); }
      else if (byMatch) { title = byMatch[1].trim(); author = byMatch[2].trim(); }
      return {
        id: uid(),
        title,
        author,
        series: defaults.series || '',
        arc: defaults.arc || '',
        seriesNumber: defaults.useSeriesNumbers ? i + 1 : null,
        format: defaults.format || 'physical',
        status: defaults.status || 'want-to-read',
        rating: null,
        tags: defaults.tags || [],
        notes: '',
        pageCount: null,
        rereads: 0,
        dateAdded: now,
      };
    });
    persistBooks([...books, ...newBooks]);
    triggerCat('sniff');
    return newBooks.length;
  }

  function deleteBook(id) {
    const book = books.find(b => b.id === id);
    if (!book) return;
    const removedLoans = lending.filter(l => l.bookId === id);
    persistBooks(books.filter(b => b.id !== id));
    persistLending(lending.filter(l => l.bookId !== id));
    pushUndo({
      message: `Removed "${book.title}"`,
      undo: () => {
        persistBooks([...books]);
        persistLending([...lending]);
      },
    });
  }

  function lendBook(data) {
    persistLending([...lending, { id: uid(), type: 'lent', dateReturned: null, ...data }]);
    setLendModal(null);
  }

  function updateLent(id, data) {
    persistLending(lending.map(l => l.id === id ? { ...l, ...data } : l));
    setLendModal(null);
  }

  function addBorrowed(data) {
    persistLending([...lending, { id: uid(), type: 'borrowed', dateReturned: null, ...data }]);
    setBorrowModal(null);
  }

  function updateLoan(id, data) {
    persistLending(lending.map(l => l.id === id ? { ...l, ...data } : l));
    setBorrowModal(null);
  }

  function markReturned(id) {
    persistLending(lending.map(l => l.id === id
      ? { ...l, dateReturned: new Date().toISOString() }
      : l
    ));
  }

  function deleteLending(id) {
    const record = lending.find(l => l.id === id);
    if (!record) return;
    persistLending(lending.filter(l => l.id !== id));
    pushUndo({
      message: `Removed loan record (${record.person || 'unknown'})`,
      undo: () => persistLending([...lending]),
    });
  }

  const filteredBooks = useMemo(() => {
    let r = [...books];
    if (search) {
      const q = search.toLowerCase();
      r = r.filter(b =>
        (b.title || '').toLowerCase().includes(q) ||
        (b.author || '').toLowerCase().includes(q) ||
        (b.series || '').toLowerCase().includes(q) ||
        (b.tags || []).some(t => t.toLowerCase().includes(q))
      );
    }
    if (statusFilter !== 'all') r = r.filter(b => b.status === statusFilter);
    if (formatFilter !== 'all') r = r.filter(b => b.format === formatFilter);
    if (tagFilter !== 'all') r = r.filter(b => (b.tags || []).includes(tagFilter));

    // Sort based on shelfSort selection
    if (shelfSort === 'newest') {
      r.sort((a, b) => (b.dateAdded || '').localeCompare(a.dateAdded || ''));
    } else if (shelfSort === 'oldest') {
      r.sort((a, b) => (a.dateAdded || '').localeCompare(b.dateAdded || ''));
    } else if (shelfSort === 'rating') {
      r.sort((a, b) => {
        const ra = a.rating ?? -1;
        const rb = b.rating ?? -1;
        if (rb !== ra) return rb - ra;
        return (a.title || '').localeCompare(b.title || '');
      });
    } else if (shelfSort === 'title') {
      r.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
    } else if (shelfSort === 'random') {
      // Stable random based on book id hash, so it doesn't reshuffle every render
      r.sort((a, b) => (a.id || '').localeCompare(b.id || ''));
      for (let i = r.length - 1; i > 0; i--) {
        const seed = (r[i].id || '').charCodeAt(0) || 0;
        const j = seed % (i + 1);
        [r[i], r[j]] = [r[j], r[i]];
      }
    } else {
      // Default: series & title
      r.sort((a, b) => {
        if (a.series && b.series) {
          if (a.series !== b.series) return a.series.localeCompare(b.series);
          return (a.seriesNumber || 0) - (b.seriesNumber || 0);
        }
        if (a.series && !b.series) return -1;
        if (!a.series && b.series) return 1;
        return (a.title || '').localeCompare(b.title || '');
      });
    }
    return r;
  }, [books, search, statusFilter, formatFilter, tagFilter, shelfSort]);

  // All unique tags across all books, sorted by frequency desc
  const allTags = useMemo(() => {
    const counts = {};
    books.forEach(b => {
      (b.tags || []).forEach(t => {
        counts[t] = (counts[t] || 0) + 1;
      });
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([t]) => t);
  }, [books]);

  const seriesGroups = useMemo(() => {
    const g = {};
    books.forEach(b => {
      if (b.series) {
        if (!g[b.series]) g[b.series] = [];
        g[b.series].push(b);
      }
    });
    Object.values(g).forEach(arr =>
      arr.sort((a, b) => (a.seriesNumber || 0) - (b.seriesNumber || 0))
    );
    return g;
  }, [books]);

  // Filter series by search query — matches series name OR any title/author within
  const filteredSeriesGroups = useMemo(() => {
    if (!search) return seriesGroups;
    const q = search.toLowerCase();
    const filtered = {};
    Object.entries(seriesGroups).forEach(([name, items]) => {
      const seriesMatches = name.toLowerCase().includes(q);
      if (seriesMatches) {
        filtered[name] = items;
      } else {
        const matchingBooks = items.filter(b =>
          (b.title || '').toLowerCase().includes(q) ||
          (b.author || '').toLowerCase().includes(q) ||
          (b.tags || []).some(t => t.toLowerCase().includes(q))
        );
        if (matchingBooks.length > 0) filtered[name] = matchingBooks;
      }
    });
    return filtered;
  }, [seriesGroups, search]);

  const lentOut = lending.filter(l => l.type === 'lent' && !l.dateReturned);
  const borrowedNow = lending.filter(l => l.type === 'borrowed' && !l.dateReturned);

  // Compute books with upcoming or overdue due dates (both borrowed AND lent out)
  const dueAlerts = useMemo(() => {
    const items = [];
    borrowedNow.forEach(l => {
      if (!l.dueDate) return;
      items.push({
        id: l.id,
        title: l.title,
        person: l.person,
        dueDate: l.dueDate,
        direction: 'borrowed',
        info: dueInfo(l.dueDate),
      });
    });
    lentOut.forEach(l => {
      if (!l.dueDate) return;
      const book = books.find(b => b.id === l.bookId);
      items.push({
        id: l.id,
        title: book?.title || '(deleted book)',
        person: l.person,
        dueDate: l.dueDate,
        direction: 'lent',
        info: dueInfo(l.dueDate),
      });
    });
    const alerts = items
      .filter(x => x.info && (x.info.tier === 'overdue' || x.info.tier === 'today' || x.info.tier === 'soon'))
      .sort((a, b) => a.info.days - b.info.days);
    return {
      all: alerts,
      overdue: alerts.filter(a => a.info.tier === 'overdue'),
      soon: alerts.filter(a => a.info.tier === 'today' || a.info.tier === 'soon'),
    };
  }, [borrowedNow, lentOut, books]);

  // Send browser notification once per session if there's anything due
  useEffect(() => {
    if (!loaded || notifiedThisSession) return;
    if (dueAlerts.all.length === 0) return;
    if (typeof window === 'undefined' || !('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
      const overdueCount = dueAlerts.overdue.length;
      const soonCount = dueAlerts.soon.length;
      const parts = [];
      if (overdueCount) parts.push(`${overdueCount} overdue`);
      if (soonCount) parts.push(`${soonCount} due soon`);
      const titles = dueAlerts.all.slice(0, 3).map(a => `"${a.title}"`).join(', ');
      new Notification('📚 Books on loan', {
        body: `${parts.join(' · ')}: ${titles}${dueAlerts.all.length > 3 ? '...' : ''}`,
        tag: 'book-tracker-due',
      });
      setNotifiedThisSession(true);
    } catch (e) {
      // notifications blocked in this context, banner will still show
    }
  }, [loaded, dueAlerts, notifiedThisSession]);

  async function requestNotifPermission() {
    if (!('Notification' in window)) return;
    try {
      const result = await Notification.requestPermission();
      setNotifPerm(result);
      setNotifiedThisSession(false); // allow a fresh notification after enabling
    } catch (e) {
      console.error('Notification permission error', e);
    }
  }

  const isLent = (bookId) => lending.find(l => l.bookId === bookId && l.type === 'lent' && !l.dateReturned);
  const getBook = (bookId) => books.find(b => b.id === bookId);

  const stats = {
    total: books.length,
    read: books.filter(b => b.status === 'read').length,
    lent: lentOut.length,
    borrowed: borrowedNow.length,
  };

  if (!loaded) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: C.bg }}>
        <div className="text-sm tracking-widest uppercase" style={{ color: C.mute, fontFamily: 'Fraunces, serif' }}>
          warming up the cocoa...
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen" style={{
      background: `radial-gradient(ellipse at top, ${C.bgDeep}, ${C.bg} 60%)`,
      fontFamily: 'Fraunces, Georgia, serif',
      color: C.ink
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400;1,9..144,500&family=Caveat:wght@400;500;600&display=swap');
        .smallcaps { font-variant-caps: all-small-caps; letter-spacing: 0.1em; }
        .handwritten { font-family: 'Caveat', cursive; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: ${C.rose}; box-shadow: 0 0 0 3px rgba(181, 104, 94, 0.12); }
        .book-card { transition: all 0.25s ease; }
        .book-card:hover { background: #FFFAEB; transform: translateY(-1px); box-shadow: 0 6px 20px -8px rgba(61, 46, 31, 0.18); }
        .pill { padding: 3px 10px; border-radius: 999px; font-size: 11px; letter-spacing: 0.06em; font-variant-caps: all-small-caps; display: inline-flex; align-items: center; gap: 4px; }
        @keyframes steam { 0% { transform: translateY(0) scaleX(1); opacity: 0.7; } 50% { transform: translateY(-8px) scaleX(1.1); opacity: 0.5; } 100% { transform: translateY(-16px) scaleX(0.9); opacity: 0; } }
        .steam-1 { animation: steam 3s ease-in-out infinite; }
        .steam-2 { animation: steam 3s ease-in-out infinite 0.6s; }
        .steam-3 { animation: steam 3s ease-in-out infinite 1.2s; }
        .soft-shadow { box-shadow: 0 2px 8px -2px rgba(61, 46, 31, 0.08); }
        .nav-btn { transition: all 0.2s ease; }
        .nav-btn:hover:not(.active) { background: ${C.borderSoft}; }
      `}</style>

      <div className="max-w-5xl mx-auto px-6 py-10">
        {/* Header */}
        <header className="mb-10">
          <div className="flex items-end justify-between flex-wrap gap-6">
            <div className="flex items-end gap-4">
              {/* Cozy mug + cat illustration */}
              <CozyIllustration mood={catMood} />
              <div>
                <div className="handwritten text-2xl mb-0" style={{ color: C.rose, lineHeight: 1, transform: 'rotate(-2deg)', display: 'inline-block' }}>
                  pull up a chair...
                </div>
                <h1 className="text-5xl md:text-6xl leading-none mt-1" style={{ fontWeight: 500, letterSpacing: '-0.02em', color: C.cocoa }}>
                  The Reading <em style={{ fontWeight: 400, color: C.rose }}>Nook</em>
                </h1>
              </div>
            </div>
            <div className="flex gap-5 text-sm" style={{ color: C.mute }}>
              <Stat n={stats.total} label="books" />
              <Stat n={stats.read} label="read" color={C.amber} />
              <Stat n={stats.lent + stats.borrowed} label="on loan" color={C.rose} />
            </div>
          </div>
        </header>

        {/* Quote of the day */}
        <QuoteOfTheDay />

        {/* Scan error toast */}
        {scanError && (
          <div className="mb-6 p-4 rounded-2xl flex items-start justify-between gap-3"
               style={{ background: '#FBEAE6', border: `1px solid ${C.rose}` }}>
            <div className="flex items-start gap-3">
              <span className="text-xl">📷</span>
              <div>
                <div className="text-sm" style={{ color: C.cocoa, fontWeight: 500 }}>Scan didn't work</div>
                <div className="text-sm italic" style={{ color: C.mute }}>{scanError}</div>
              </div>
            </div>
            <button
              onClick={() => setScanError(null)}
              className="p-1 rounded-full"
              style={{ color: C.mute }}
            >
              <X size={16} />
            </button>
          </div>
        )}

        {/* Due-date banner */}
        <DueBanner
          alerts={dueAlerts}
          notifPerm={notifPerm}
          onRequestPerm={requestNotifPermission}
          onJump={(v) => setView(v)}
        />

        {/* Navigation */}
        <nav className="flex flex-wrap gap-2 mb-8">
          {[
            { id: 'library', label: 'Shelf', icon: LibraryIcon },
            { id: 'series', label: 'Series', icon: Layers },
            { id: 'stats', label: 'Stats', icon: BarChart3 },
            { id: 'lent', label: 'Lent Out', icon: Send, badge: lentOut.length },
            { id: 'borrowed', label: 'Borrowed', icon: Inbox, badge: borrowedNow.length },
          ].map(t => {
            const Icon = t.icon;
            const active = view === t.id;
            return (
              <button
                key={t.id}
                onClick={() => setView(t.id)}
                className={`nav-btn flex items-center gap-2 px-4 py-2 text-sm rounded-full ${active ? 'active' : ''}`}
                style={{
                  background: active ? C.cocoa : C.card,
                  color: active ? C.bg : C.ink,
                  border: `1px solid ${active ? C.cocoa : C.border}`,
                }}
              >
                <Icon size={14} />
                <span>{t.label}</span>
                {t.badge ? (
                  <span className="text-xs px-1.5 rounded-full" style={{
                    background: active ? C.rose : C.cocoa,
                    color: C.bg,
                    minWidth: '20px',
                    textAlign: 'center'
                  }}>{t.badge}</span>
                ) : null}
              </button>
            );
          })}

          <div className="ml-auto flex gap-2 flex-wrap">
            <button
              onClick={() => setSettingsModal(true)}
              className="flex items-center justify-center p-2 text-sm rounded-full"
              style={{ background: C.card, color: C.ink, border: `1px solid ${C.border}` }}
              title="Settings, export & import"
            >
              <Settings size={16} />
            </button>
            <button
              onClick={() => setShowScanModal(true)}
              className="flex items-center gap-2 px-4 py-2 text-sm rounded-full soft-shadow"
              style={{ background: C.cocoa, color: C.bg }}
              title="Drop, paste, or pick a photo of a book cover"
            >
              <Camera size={14} /> Scan
            </button>
            <button
              onClick={() => setBookModal('new')}
              className="flex items-center gap-2 px-4 py-2 text-sm rounded-full soft-shadow"
              style={{ background: C.rose, color: C.bg }}
            >
              <Plus size={14} /> Add Book
            </button>
            <button
              onClick={() => setBulkAddOpen(true)}
              className="flex items-center gap-2 px-4 py-2 text-sm rounded-full"
              style={{ background: C.card, color: C.ink, border: `1px solid ${C.border}` }}
              title="Add multiple books at once"
            >
              <ListPlus size={14} /> Bulk Add
            </button>
            <button
              onClick={browseSimilar}
              className="flex items-center gap-2 px-4 py-2 text-sm rounded-full"
              style={{ background: C.card, color: C.ink, border: `1px solid ${C.border}` }}
              title="Free: browse books in similar genres from Open Library"
            >
              <Layers size={14} /> Browse similar
            </button>
            <button
              onClick={() => setBorrowModal('new')}
              className="flex items-center gap-2 px-4 py-2 text-sm rounded-full"
              style={{ background: C.card, color: C.ink, border: `1px solid ${C.border}` }}
            >
              <Inbox size={14} /> Log Borrowed
            </button>
          </div>
        </nav>

        {/* LIBRARY VIEW */}
        {view === 'library' && (
          <div>
            <div className="flex flex-wrap gap-3 mb-6 items-center">
              <div className="flex items-center gap-2 px-4 py-2 flex-1 min-w-[200px] rounded-full soft-shadow"
                   style={{ background: C.card, border: `1px solid ${C.borderSoft}` }}>
                <Search size={14} style={{ color: C.mute }} />
                <input
                  type="text"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="What are you looking for?"
                  className="flex-1 bg-transparent text-sm"
                  style={{ fontFamily: 'inherit', color: C.ink }}
                />
                {search && (
                  <button onClick={() => setSearch('')}><X size={14} style={{ color: C.mute }} /></button>
                )}
              </div>
              <select
                value={statusFilter}
                onChange={e => setStatusFilter(e.target.value)}
                className="px-3 py-2 text-sm rounded-full"
                style={{ background: C.card, border: `1px solid ${C.borderSoft}`, fontFamily: 'inherit', color: C.ink }}
              >
                <option value="all">All Status</option>
                <option value="want-to-read">Want to Read</option>
                <option value="reading">Reading</option>
                <option value="read">Read</option>
              </select>
              <select
                value={formatFilter}
                onChange={e => setFormatFilter(e.target.value)}
                className="px-3 py-2 text-sm rounded-full"
                style={{ background: C.card, border: `1px solid ${C.borderSoft}`, fontFamily: 'inherit', color: C.ink }}
              >
                <option value="all">All Formats</option>
                <option value="physical">Physical</option>
                <option value="kindle">Kindle</option>
              </select>
              {allTags.length > 0 && (
                <select
                  value={tagFilter}
                  onChange={e => setTagFilter(e.target.value)}
                  className="px-3 py-2 text-sm rounded-full"
                  style={{ background: C.card, border: `1px solid ${C.borderSoft}`, fontFamily: 'inherit', color: C.ink }}
                >
                  <option value="all">All Tags</option>
                  {allTags.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              )}
              <select
                value={shelfSort}
                onChange={e => setShelfSort(e.target.value)}
                className="px-3 py-2 text-sm rounded-full"
                style={{ background: C.card, border: `1px solid ${C.borderSoft}`, fontFamily: 'inherit', color: C.ink }}
                title="Sort"
              >
                <option value="series">Sort: Series &amp; title</option>
                <option value="newest">Sort: Newest first</option>
                <option value="oldest">Sort: Oldest first</option>
                <option value="rating">Sort: Highest rated</option>
                <option value="title">Sort: Title A→Z</option>
                <option value="random">Sort: Random</option>
              </select>
            </div>

            {filteredBooks.length === 0 ? (
              <EmptyState
                title={books.length === 0 ? "Your shelf is bare" : "Nothing matches that"}
                subtitle={books.length === 0 ? "Curl up and add your first book." : "Try clearing your search or filters."}
                action={books.length === 0 ? { label: 'Add a book', onClick: () => setBookModal('new') } : null}
              />
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {filteredBooks.map(b => (
                  <BookCard
                    key={b.id}
                    book={b}
                    lent={isLent(b.id)}
                    onEdit={() => setBookModal(b)}
                    onDelete={() => deleteBook(b.id)}
                    onLend={() => setLendModal({ book: b, loan: null })}
                    onReturn={() => {
                      const rec = isLent(b.id);
                      if (rec) markReturned(rec.id);
                    }}
                    onRate={(r) => updateBookRating(b.id, r)}
                              onMarkRead={() => markBookRead(b.id)}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {/* SERIES VIEW */}
        {view === 'series' && (
          <div>
            {Object.keys(seriesGroups).length > 0 && (
              <div className="flex items-center gap-2 px-4 py-2 mb-6 rounded-full soft-shadow"
                   style={{ background: C.card, border: `1px solid ${C.borderSoft}` }}>
                <Search size={14} style={{ color: C.mute }} />
                <input
                  type="text"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Search series, titles, or authors..."
                  className="flex-1 bg-transparent text-sm"
                  style={{ fontFamily: 'inherit', color: C.ink }}
                />
                {search && (
                  <button onClick={() => setSearch('')}><X size={14} style={{ color: C.mute }} /></button>
                )}
              </div>
            )}

            {Object.keys(seriesGroups).length === 0 ? (
              <EmptyState
                title="No series yet"
                subtitle="When you add a book with a series name, it'll show up grouped here."
              />
            ) : Object.keys(filteredSeriesGroups).length === 0 ? (
              <EmptyState
                title="Nothing matches that"
                subtitle="Try a different search or clear it to see all your series."
              />
            ) : (
              <div className="space-y-8">
                {Object.entries(filteredSeriesGroups)
                  .sort(([a], [b]) => a.localeCompare(b))
                  .map(([seriesName, items]) => (
                    <SeriesGroup
                      key={seriesName}
                      seriesName={seriesName}
                      items={items}
                      isLent={isLent}
                      onEditBook={(b) => setBookModal(b)}
                      onDeleteBook={(id) => deleteBook(id)}
                      onLendBook={(b) => setLendModal({ book: b, loan: null })}
                      onReturnBook={(b) => {
                        const rec = isLent(b.id);
                        if (rec) markReturned(rec.id);
                      }}
                      onRateBook={(id, r) => updateBookRating(id, r)}
                      onMarkReadBook={(id) => markBookRead(id)}
                    />
                  ))}
              </div>
            )}
          </div>
        )}

        {/* STATS VIEW */}
        {view === 'stats' && (
          <StatsView
            books={books}
            lending={lending}
            readDays={readDays}
            goal={goal}
            onSetGoal={persistGoal}
            onLogSession={logReadingSession}
            onAddReread={addReread}
            onOpenWrap={() => setWrapModal(true)}
          />
        )}

        {/* LENT OUT VIEW */}
        {view === 'lent' && (
          <div>
            <div className="mb-6">
              <p className="handwritten text-xl" style={{ color: C.mute }}>
                Books visiting other people's homes for a while.
              </p>
            </div>
            {lentOut.length === 0 ? (
              <EmptyState
                title="No books out wandering"
                subtitle="When you lend a book, it'll appear here so you remember who has it."
              />
            ) : (
              <div className="space-y-3">
                {sortByDueDate(lentOut).map(rec => {
                  const book = getBook(rec.bookId);
                  return (
                    <LoanCard
                      key={rec.id}
                      title={book?.title || '(deleted book)'}
                      author={book?.author}
                      person={rec.person}
                      dateLabel={`Lent ${formatDate(rec.dateOut)}`}
                      days={daysSince(rec.dateOut)}
                      direction="out"
                      notes={rec.notes}
                      dueDate={rec.dueDate}
                      onEdit={() => setLendModal({ book, loan: rec })}
                      onReturn={() => markReturned(rec.id)}
                      onDelete={() => deleteLending(rec.id)}
                    />
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* BORROWED VIEW */}
        {view === 'borrowed' && (
          <div>
            <div className="mb-6">
              <p className="handwritten text-xl" style={{ color: C.mute }}>
                Books you've borrowed and owe back — don't forget!
              </p>
            </div>
            {borrowedNow.length === 0 ? (
              <EmptyState
                title="You don't owe anyone a book"
                subtitle="When you borrow a book, log it here so you don't forget."
                action={{ label: 'Log a borrowed book', onClick: () => setBorrowModal('new') }}
              />
            ) : (
              <div className="space-y-3">
                {sortByDueDate(borrowedNow).map(rec => (
                  <LoanCard
                    key={rec.id}
                    title={rec.title}
                    author={rec.author}
                    person={rec.person}
                    dateLabel={`Borrowed ${formatDate(rec.dateOut)}`}
                    days={daysSince(rec.dateOut)}
                    direction="in"
                    notes={rec.notes}
                    dueDate={rec.dueDate}
                    onEdit={() => setBorrowModal(rec)}
                    onReturn={() => markReturned(rec.id)}
                    onDelete={() => deleteLending(rec.id)}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {/* Footer flourish */}
        <div className="mt-16 text-center handwritten text-lg" style={{ color: C.mute, opacity: 0.6 }}>
          ~ happy reading ~
        </div>
      </div>

      {/* MODALS */}
      {bookModal && (
        <BookModal
          book={bookModal === 'new' ? null : bookModal}
          onSave={saveBook}
          onClose={() => setBookModal(null)}
          allTags={allTags}
        />
      )}
      {lendModal && (
        <LendModal
          book={lendModal.book}
          existing={lendModal.loan}
          onLend={(data) => lendBook({ bookId: lendModal.book.id, ...data })}
          onUpdate={updateLent}
          onClose={() => setLendModal(null)}
        />
      )}
      {borrowModal && (
        <BorrowModal
          existing={borrowModal === 'new' ? null : borrowModal}
          onAdd={addBorrowed}
          onUpdate={updateLoan}
          onClose={() => setBorrowModal(null)}
        />
      )}

      {/* Scan modal — drop, paste, or pick an image */}
      {showScanModal && (
        <ScanModal
          onPick={handleScanFile}
          onClose={() => setShowScanModal(false)}
        />
      )}

      {/* Settings modal */}
      {settingsModal && (
        <SettingsModal
          bookCount={books.length}
          loanCount={lending.length}
          missingCovers={books.filter(b => !b.coverImage).length}
          onExport={exportLibrary}
          onImport={importLibrary}
          onAutoFetchCovers={() => { setSettingsModal(false); autoFetchCovers(); }}
          onClose={() => setSettingsModal(false)}
        />
      )}

      {/* Auto-fetch covers progress modal */}
      {autoFetch && (
        <AutoFetchModal
          state={autoFetch}
          onCancel={cancelAutoFetch}
          onClose={closeAutoFetch}
        />
      )}

      {/* Similar books modal (free, no API key) */}
      {similarModal && (
        <SimilarBooksModal
          state={similarModal}
          onAdd={addSimilarBook}
          onRetry={browseSimilar}
          onClose={() => setSimilarModal(null)}
        />
      )}

      {/* Scanning overlay */}
      {scanning && <ScanningOverlay />}

      {/* Confirm / info dialog (replaces blocked browser confirm/alert) */}
      {dialog && (
        <ConfirmDialog
          {...dialog}
          onClose={() => setDialog(null)}
        />
      )}

      {/* Year-in-review modal */}
      {wrapModal && (
        <YearWrapModal
          books={books}
          readDays={readDays}
          onClose={() => setWrapModal(false)}
        />
      )}

      {/* Bulk add modal */}
      {bulkAddOpen && (
        <BulkAddModal
          allTags={allTags}
          onAdd={(text, defaults) => {
            const count = bulkAddBooks(text, defaults);
            setBulkAddOpen(false);
            if (count > 0) showInfo('Added!', `Added ${count} ${count === 1 ? 'book' : 'books'} to your shelf.`);
          }}
          onClose={() => setBulkAddOpen(false)}
        />
      )}

      {/* Undo toast stack */}
      <UndoToastStack toasts={undoStack} onUndo={(id, fn) => { fn(); dismissUndo(id); }} onDismiss={dismissUndo} />
    </div>
  );
}

function ConfirmDialog({ title, body, danger, info, confirmLabel, onConfirm, onClose }) {
  const isInfo = info || !onConfirm;
  return (
    <Modal title={title} onClose={onClose}>
      <p className="text-sm" style={{ color: C.mute, lineHeight: 1.5 }}>{body}</p>
      <div className="flex justify-end gap-2 pt-5">
        {!isInfo && (
          <button
            onClick={onClose}
            className="px-5 py-2 text-sm rounded-full"
            style={{ background: 'transparent', border: `1px solid ${C.border}`, color: C.ink }}
          >
            Cancel
          </button>
        )}
        <button
          onClick={() => { if (onConfirm) onConfirm(); onClose(); }}
          className="px-5 py-2 text-sm rounded-full soft-shadow"
          style={{ background: danger ? C.rose : C.cocoa, color: C.bg }}
        >
          {confirmLabel || (isInfo ? 'OK' : 'Confirm')}
        </button>
      </div>
    </Modal>
  );
}

function StatsView({ books, lending, readDays, goal, onSetGoal, onLogSession, onAddReread, onOpenWrap }) {
  const today = todayISO();
  const readDaysSet = useMemo(() => readDaysToDateSet(readDays), [readDays]);
  const readToday = readDaysSet.has(today);
  const streaks = useMemo(() => computeStreak(readDaysSet), [readDaysSet]);

  // Find which book was logged today, if any
  const todayEntry = useMemo(() => {
    return (readDays || []).find(d => typeof d === 'object' && d.date === today);
  }, [readDays, today]);
  const todayBook = todayEntry?.bookId ? books.find(b => b.id === todayEntry.bookId) : null;

  // Read-by-year
  const byYear = useMemo(() => {
    const m = {};
    books.forEach(b => {
      if (b.status === 'read') {
        const y = b.dateAdded ? new Date(b.dateAdded).getFullYear() : new Date().getFullYear();
        m[y] = (m[y] || 0) + 1;
      }
    });
    return m;
  }, [books]);

  const currentYear = new Date().getFullYear();
  const readThisYear = byYear[currentYear] || 0;

  // Average rating across rated books
  const rated = books.filter(b => b.rating != null && b.rating > 0);
  const avgRating = rated.length > 0 ? (rated.reduce((s, b) => s + b.rating, 0) / rated.length) : null;

  // Pages-read: sum of pageCount across all 'read' books (including rereads count)
  const totalPagesRead = useMemo(() => {
    return books.reduce((sum, b) => {
      if (b.status !== 'read' || !b.pageCount) return sum;
      const times = 1 + (b.rereads || 0);
      return sum + b.pageCount * times;
    }, 0);
  }, [books]);
  const avgPages = useMemo(() => {
    const withPages = books.filter(b => b.status === 'read' && b.pageCount);
    if (withPages.length === 0) return null;
    return Math.round(withPages.reduce((s, b) => s + b.pageCount, 0) / withPages.length);
  }, [books]);

  // Top authors
  const authorCounts = useMemo(() => {
    const m = {};
    books.forEach(b => {
      if (!b.author) return;
      m[b.author] = (m[b.author] || 0) + 1;
    });
    return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 5);
  }, [books]);

  // Top tags
  const tagCounts = useMemo(() => {
    const m = {};
    books.forEach(b => (b.tags || []).forEach(t => { m[t] = (m[t] || 0) + 1; }));
    return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 8);
  }, [books]);

  // Format breakdown
  const physical = books.filter(b => b.format === 'physical').length;
  const kindle = books.filter(b => b.format === 'kindle').length;

  // Re-read champions
  const rereadBooks = books.filter(b => (b.rereads || 0) > 0).sort((a, b) => (b.rereads || 0) - (a.rereads || 0)).slice(0, 5);

  // Longest finished series
  const seriesProgress = useMemo(() => {
    const m = {};
    books.forEach(b => {
      if (!b.series) return;
      if (!m[b.series]) m[b.series] = { total: 0, read: 0 };
      m[b.series].total++;
      if (b.status === 'read') m[b.series].read++;
    });
    return Object.entries(m)
      .filter(([, v]) => v.total > 1)
      .sort((a, b) => b[1].read - a[1].read);
  }, [books]);

  // Heatmap data — last 52 weeks, ALIGNED to Sun-Sat columns
  // Each column is a calendar week (Sun on top, Sat on bottom)
  // The rightmost column is the current week; future days in that column are flagged
  const heatmap = useMemo(() => {
    const days = [];
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const todayDow = today.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat

    // The bottom-right cell of the grid should be the Saturday of the current week.
    const lastSat = new Date(today);
    lastSat.setDate(lastSat.getDate() + (6 - todayDow));

    // Start day is 52*7 - 1 days before lastSat, which lands on a Sunday.
    const startDay = new Date(lastSat);
    startDay.setDate(startDay.getDate() - (52 * 7 - 1));

    for (let i = 0; i < 52 * 7; i++) {
      const d = new Date(startDay);
      d.setDate(d.getDate() + i);
      const iso = localISO(d);
      const isFuture = d > today;
      const isToday = iso === localISO(today);
      days.push({ date: d, iso, read: !isFuture && readDaysSet.has(iso), isFuture, isToday });
    }
    return days;
  }, [readDaysSet]);

  // Re-read books for the inline +1 widget
  const readableBooks = books.filter(b => b.status === 'read');

  return (
    <div className="space-y-8">
      {/* Daily check-in & streak */}
      <div className="p-5 rounded-2xl soft-shadow" style={{ background: C.card, border: `1px solid ${C.borderSoft}` }}>
        <div className="flex items-center gap-2 mb-3">
          <Flame size={20} style={{ color: readToday ? C.rose : C.mute }} />
          <h2 className="text-2xl" style={{ fontWeight: 500, color: C.cocoa }}>Reading streak</h2>
        </div>
        {readToday && todayBook ? (
          <div className="p-3 rounded-xl mb-4" style={{ background: 'rgba(122, 143, 107, 0.15)', border: `1px solid ${C.sage}` }}>
            <div className="text-xs smallcaps mb-1" style={{ color: C.sage }}>logged today</div>
            <div className="text-base" style={{ color: C.cocoa, fontWeight: 500 }}>
              📖 {todayBook.title}
            </div>
            <button
              onClick={() => onLogSession(todayBook.id)}
              className="text-xs underline mt-1"
              style={{ color: C.mute, background: 'none', border: 'none', cursor: 'pointer' }}
            >
              undo
            </button>
          </div>
        ) : readToday ? (
          <p className="text-sm italic mb-4" style={{ color: C.mute }}>You logged a reading session today.</p>
        ) : (
          <DailyLogPicker books={books} onLog={onLogSession} />
        )}
        <div className="grid grid-cols-2 gap-4 mb-4">
          <StreakStat n={streaks.current} label="current streak" highlight={streaks.current > 0} />
          <StreakStat n={streaks.longest} label="longest streak" />
        </div>
        <Heatmap days={heatmap} />
      </div>

      {/* Goal */}
      <GoalCard goal={goal} readThisYear={readThisYear} onSetGoal={onSetGoal} currentYear={currentYear} />

      {/* This year overview */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatTile big={books.length} label="books on the shelf" />
        <StatTile big={books.filter(b => b.status === 'read').length} label="lifetime reads" color={C.amber} />
        <StatTile big={readThisYear} label={`read in ${currentYear}`} color={C.rose} />
        <StatTile big={avgRating != null ? avgRating.toFixed(1) : '—'} label="avg rating" color={C.cocoa} />
      </div>

      {/* Pages stats row — only shown when any books have a pageCount */}
      {totalPagesRead > 0 && (
        <div className="grid grid-cols-2 gap-3">
          <StatTile big={totalPagesRead.toLocaleString()} label="total pages read" color={C.cocoa} />
          {avgPages != null && <StatTile big={avgPages.toLocaleString()} label="avg pages per book" color={C.amber} />}
        </div>
      )}

      {/* Format split */}
      {(physical + kindle) > 0 && (
        <CollapsibleSection title="Physical vs Kindle" defaultOpen={false}>
          <FormatBar physical={physical} kindle={kindle} />
        </CollapsibleSection>
      )}

      {/* Favorite authors */}
      {authorCounts.length > 0 && (
        <CollapsibleSection title="Most-read authors" defaultOpen={false}>
          <div className="space-y-2">
            {authorCounts.map(([author, n]) => (
              <AuthorBar key={author} author={author} n={n} max={authorCounts[0][1]} />
            ))}
          </div>
        </CollapsibleSection>
      )}

      {/* Top tags */}
      {tagCounts.length > 0 && (
        <CollapsibleSection title="Top tags" defaultOpen={false}>
          <div className="flex flex-wrap gap-2">
            {tagCounts.map(([tag, n]) => (
              <span
                key={tag}
                className="pill"
                style={{
                  background: 'rgba(212, 154, 74, 0.18)',
                  color: C.cocoa,
                  border: `1px solid rgba(212, 154, 74, 0.5)`,
                  fontSize: 12,
                  padding: '5px 12px',
                }}
              >
                # {tag} <span style={{ color: C.mute, marginLeft: 4 }}>· {n}</span>
              </span>
            ))}
          </div>
        </CollapsibleSection>
      )}

      {/* Series progress */}
      {seriesProgress.length > 0 && (
        <CollapsibleSection title="Series progress" defaultOpen={false}>
          <div className="space-y-2">
            {seriesProgress.slice(0, 5).map(([name, v]) => (
              <SeriesProgressBar key={name} name={name} read={v.read} total={v.total} />
            ))}
          </div>
        </CollapsibleSection>
      )}

      {/* Re-reads */}
      <CollapsibleSection title="Re-reads" icon={RotateCcw} defaultOpen={false}>
        {rereadBooks.length === 0 ? (
          <p className="text-sm italic" style={{ color: C.mute }}>
            No re-reads logged yet. When you re-read a book, tap the +1 button below to add it to its tally.
          </p>
        ) : (
          <div className="space-y-2 mb-4">
            {rereadBooks.map(b => (
              <div key={b.id} className="flex items-center justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <div className="text-sm truncate" style={{ color: C.cocoa, fontWeight: 500 }}>{b.title}</div>
                  {b.author && <div className="text-xs italic truncate" style={{ color: C.mute }}>by {b.author}</div>}
                </div>
                <span className="pill" style={{ background: C.amber, color: C.cocoa, border: `1px solid ${C.amber}` }}>
                  ×{b.rereads + 1} reads
                </span>
              </div>
            ))}
          </div>
        )}
        {readableBooks.length > 0 && (
          <RereadPicker books={readableBooks} onAddReread={onAddReread} />
        )}
      </CollapsibleSection>

      {/* Lending history */}
      <CollapsibleSection title="Lending history" icon={Send} defaultOpen={false}>
        <LendingHistoryInner lending={lending} books={books} />
      </CollapsibleSection>

      {/* Year-in-review trigger */}
      {readThisYear > 0 && (
        <div className="p-5 rounded-2xl text-center" style={{ background: 'rgba(212, 154, 74, 0.15)', border: `1px solid ${C.amber}` }}>
          <div className="text-2xl mb-1">✨</div>
          <h3 className="text-xl mb-1" style={{ fontWeight: 500, color: C.cocoa }}>{currentYear} in review</h3>
          <p className="text-sm italic mb-3" style={{ color: C.mute }}>See your year of reading in one glance.</p>
          <button onClick={onOpenWrap} className="px-5 py-2 text-sm rounded-full soft-shadow flex items-center gap-2 mx-auto" style={{ background: C.cocoa, color: C.bg }}>
            <Sparkles size={14} /> Open year wrap-up
          </button>
        </div>
      )}
    </div>
  );
}

function Heatmap({ days }) {
  // 7 rows × 16 columns
  const cols = 52;
  const cellSize = 11;
  const monthLabels = useMemo(() => {
    const labels = [];
    for (let c = 0; c < cols; c++) {
      const dayInCol = days[c * 7];
      if (dayInCol) {
        const m = dayInCol.date.getMonth();
        const prev = c > 0 ? days[(c - 1) * 7].date.getMonth() : -1;
        labels.push(m !== prev ? dayInCol.date.toLocaleDateString('en-US', { month: 'short' }) : '');
      } else labels.push('');
    }
    return labels;
  }, [days]);

  return (
    <div className="overflow-x-auto">
      <div className="flex gap-[2px] mb-1" style={{ paddingLeft: 16 }}>
        {monthLabels.map((m, i) => (
          <div key={i} style={{ width: cellSize, fontSize: 9, color: C.mute, letterSpacing: '0.05em' }}>{m}</div>
        ))}
      </div>
      <div className="flex gap-1">
        <div className="flex flex-col gap-[2px] mr-1" style={{ fontSize: 8, color: C.mute }}>
          {['', 'M', '', 'W', '', 'F', ''].map((l, i) => (
            <div key={i} style={{ height: cellSize, lineHeight: `${cellSize}px` }}>{l}</div>
          ))}
        </div>
        <div className="grid grid-flow-col gap-[2px]" style={{ gridTemplateRows: `repeat(7, ${cellSize}px)` }}>
          {days.map((d) => {
            // Future days: render as invisible spacers
            if (d.isFuture) {
              return (
                <div
                  key={d.iso}
                  style={{
                    width: cellSize,
                    height: cellSize,
                    background: 'transparent',
                  }}
                />
              );
            }
            return (
              <div
                key={d.iso}
                title={`${d.iso}${d.read ? ' — read' : ''}${d.isToday ? ' (today)' : ''}`}
                style={{
                  width: cellSize,
                  height: cellSize,
                  borderRadius: 2,
                  background: d.read ? C.rose : C.borderSoft,
                  opacity: d.read ? 1 : 0.5,
                  outline: d.isToday ? `1.5px solid ${C.cocoa}` : 'none',
                  outlineOffset: d.isToday ? 1 : 0,
                }}
              />
            );
          })}
        </div>
      </div>
    </div>
  );
}

function GoalCard({ goal, readThisYear, onSetGoal, currentYear }) {
  const [editing, setEditing] = useState(false);
  const activeGoal = goal && goal.year === currentYear ? goal : null;
  const target = activeGoal?.target || 0;
  const pct = target > 0 ? Math.min(100, (readThisYear / target) * 100) : 0;
  const met = target > 0 && readThisYear >= target;

  return (
    <div className="p-5 rounded-2xl soft-shadow" style={{ background: C.card, border: `1px solid ${C.borderSoft}` }}>
      <div className="flex items-center justify-between gap-3 flex-wrap mb-3">
        <h3 className="text-xl flex items-center gap-2" style={{ fontWeight: 500, color: C.cocoa }}>
          <Target size={18} /> Reading goal — {currentYear}
        </h3>
        {!editing && (
          <button onClick={() => setEditing(true)} className="text-xs smallcaps px-3 py-1 rounded-full" style={{ background: C.bg, border: `1px solid ${C.border}`, color: C.cocoa }}>
            {activeGoal ? 'Change goal' : 'Set a goal'}
          </button>
        )}
      </div>

      {editing ? (
        <GoalEditor
          initial={target}
          onSave={(t) => { onSetGoal({ year: currentYear, target: t }); setEditing(false); }}
          onCancel={() => setEditing(false)}
          onClear={() => { onSetGoal(null); setEditing(false); }}
          hasExisting={!!activeGoal}
        />
      ) : activeGoal ? (
        <>
          <div className="flex items-baseline justify-between mb-2">
            <div>
              <span className="text-3xl" style={{ color: C.cocoa, fontWeight: 500 }}>{readThisYear}</span>
              <span className="text-lg" style={{ color: C.mute }}> / {target}</span>
            </div>
            <div className="text-sm smallcaps" style={{ color: met ? C.sage : C.mute }}>
              {met ? '✨ goal reached!' : `${Math.round(pct)}% complete`}
            </div>
          </div>
          <div className="h-3 rounded-full overflow-hidden" style={{ background: C.borderSoft }}>
            <div className="h-full rounded-full transition-all" style={{ background: met ? C.sage : C.rose, width: `${pct}%` }} />
          </div>
        </>
      ) : (
        <p className="text-sm italic" style={{ color: C.mute }}>
          No goal set yet — set a reading target for the year if you like a little nudge.
        </p>
      )}
    </div>
  );
}

function RereadPicker({ books, onAddReread }) {
  const [selected, setSelected] = useState('');

function LendingHistoryInner({ lending, books }) {
  const stats = useMemo(() => {
    const m = {};
    lending.forEach(rec => {
      const person = rec.person;
      if (!person) return;
      if (!m[person]) m[person] = { lentTotal: 0, lentOpen: 0, borrowedTotal: 0, borrowedOpen: 0, latest: null };
      const slot = m[person];
      const isOpen = !rec.dateReturned;
      if (rec.type === 'lent') {
        slot.lentTotal++;
        if (isOpen) slot.lentOpen++;
      } else {
        slot.borrowedTotal++;
        if (isOpen) slot.borrowedOpen++;
      }
      const ts = rec.dateReturned || rec.dateOut;
      if (ts && (!slot.latest || ts > slot.latest)) slot.latest = ts;
    });
    return Object.entries(m).sort((a, b) => {
      const aOpen = a[1].lentOpen + a[1].borrowedOpen;
      const bOpen = b[1].lentOpen + b[1].borrowedOpen;
      if (aOpen !== bOpen) return bOpen - aOpen;
      const aTotal = a[1].lentTotal + a[1].borrowedTotal;
      const bTotal = b[1].lentTotal + b[1].borrowedTotal;
      if (aTotal !== bTotal) return bTotal - aTotal;
      return a[0].localeCompare(b[0]);
    });
  }, [lending]);

  const totalLifetime = lending.length;
  const currentlyOut = lending.filter(l => l.type === 'lent' && !l.dateReturned).length;
  const currentlyIn = lending.filter(l => l.type === 'borrowed' && !l.dateReturned).length;
  const returned = lending.filter(l => l.dateReturned).length;

  if (totalLifetime === 0) {
    return (
      <p className="text-sm italic" style={{ color: C.mute }}>
        When you lend or borrow books, the history will appear here — even after they're returned.
      </p>
    );
  }

  return (
    <>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
        <MiniStat n={totalLifetime} label="all loans" />
        <MiniStat n={returned} label="returned" color={C.sage} />
        <MiniStat n={currentlyOut} label="lent out now" color={currentlyOut > 0 ? C.rose : C.mute} />
        <MiniStat n={currentlyIn} label="borrowed now" color={currentlyIn > 0 ? C.amber : C.mute} />
      </div>

      <div className="space-y-2 pt-3" style={{ borderTop: `1px solid ${C.borderSoft}` }}>
        <div className="text-xs smallcaps mb-2" style={{ color: C.mute }}>by person</div>
        {stats.map(([person, s]) => (
          <PersonRow key={person} person={person} s={s} />
        ))}
      </div>

      <p className="text-xs italic mt-4 pt-3" style={{ color: C.mute, borderTop: `1px solid ${C.borderSoft}` }}>
        Tip: returned loans stay in your history forever, so you can see patterns over time.
      </p>
    </>
  );
}
