# Nginx vhost for the App Launcher static site.
#
# Initial install (HTTP only); Certbot rewrites this to add the 443 server
# block and an HTTP->HTTPS redirect, exactly like the other apps on this box:
#
#   cp deploy/nginx.conf /etc/nginx/sites-available/app-launcher
#   ln -s /etc/nginx/sites-available/app-launcher /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d apps.myexperiments.app
#
# The build lives in /root (mode 0700, unreadable by nginx's www-data user),
# so the deploy publishes the built files to /var/www/app-launcher, which
# nginx serves straight from disk — no app process to run.
server {
    listen 80;
    server_name apps.myexperiments.app;

    root /var/www/app-launcher;
    index index.html;

    # Astro builds directory-style routes (/apps/<slug>/index.html); fall back
    # to a 404 page if a path doesn't exist.
    location / {
        try_files $uri $uri/ =404;
    }

    # Long-cache the fingerprinted asset bundles Astro emits under /_astro/.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
